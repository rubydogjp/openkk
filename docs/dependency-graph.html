<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>гғ‘гғғгӮұгғјгӮё дҫқеӯҳй–ўдҝӮеӣі</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #fff; font-family: system-ui, sans-serif; padding: 32px; }
#canvas-wrap { width: 100%; overflow: hidden; }
#canvas { position: relative; transform-origin: top left; }
.grp { position: absolute; border-radius: 12px; border: 1.5px solid #ccc; background: #f5f5f5; z-index: 0; }
.gl  { position: absolute; top: 8px; left: 14px; font-size: 11px; font-weight: 700;
       text-transform: uppercase; letter-spacing: .08em; color: #999; }
.nd  { position: absolute; border-radius: 8px; border: 1.5px solid #555; background: #fff; color: #111;
       display: flex; align-items: center; justify-content: center;
       font-size: 13px; font-weight: 500; z-index: 2; padding: 0 8px; }
.nd span { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; min-width: 0; }
.el        { position: absolute; height: 1.5px; transform-origin: 0 50%; pointer-events: none; z-index: 1; background: #555; }
.el::after { content: ''; position: absolute; right: 0; top: 50%; transform: translateY(-50%);
             width: 0; height: 0; border-top: 4px solid transparent; border-bottom: 4px solid transparent;
             border-left: 7px solid #555; }
.no-arr::after { display: none; }
</style>
</head>
<body>
<h1 style="font-size:18px;font-weight:700;margin-bottom:6px;">гғ‘гғғгӮұгғјгӮё дҫқеӯҳй–ўдҝӮеӣі</h1>
<p style="font-size:12px;color:#888;margin-bottom:24px;">@rubydogjp/openkk-* зңҒз•Ҙ</p>
<div id="canvas-wrap">
<div id="canvas"></div>
</div>

<script>
const L = {
  margin: 48, rowGap: 48, colGap: 56,
  col0w: 640, col1w: 640,
  pad: 24, labelH: 22,
  nodeW: 272, nodeH: 44, nodeGap: 32, innerColGap: 48,
};
const ROW_GAP = { 0: 96, 2: 96 };
const GROUPS = [
  { id:"app",      label:"Frontend (App)",   row:0, col:0, cs:2, nodes:[
    { id:"openkk",          label:"openkk",                   gc:0, gr:0, nc:2, center:1 },
  ]},
  { id:"client",   label:"Client",           row:1, col:0, cs:1, nodes:[
    { id:"client",          label:"client",                   gc:0, gr:0, nc:2 },
    { id:"client_ui",       label:"client-ui",                gc:0, gr:1 },
    { id:"client_usecases", label:"client-usecases",          gc:0, gr:2 },
    { id:"client_ports",    label:"client-ports",             gc:1, gr:3 },
    { id:"client_domain",   label:"client-domain",            gc:1, gr:4 },
  ]},
  { id:"cadapter", label:"Client Adapters",  row:1, col:1, cs:1, nodes:[
    { id:"emb_bk_adp",      label:"embedded-backend-adapter", gc:0, gr:0 },
    { id:"print_adp",       label:"print-adapter",            gc:1, gr:0 },
  ]},
  { id:"embedded", label:"Embedded Backend", row:2, col:0, cs:2, nodes:[
    { id:"emb_bk",          label:"embedded-backend",         gc:0, gr:0, nc:2, center:1 },
  ]},
  { id:"server",   label:"Server",           row:3, col:0, cs:1, nodes:[
    { id:"server",          label:"server",                   gc:0, gr:0, nc:2 },
    { id:"server_api",      label:"server-api",               gc:0, gr:1 },
    { id:"server_usecases", label:"server-usecases",          gc:0, gr:2 },
    { id:"server_ports",    label:"server-ports",             gc:1, gr:3 },
    { id:"server_domain",   label:"server-domain",            gc:1, gr:4 },
  ]},
  { id:"sadapter", label:"Server Adapters",  row:3, col:1, cs:1, nodes:[
    { id:"file_db_adp",     label:"file-db-adapter",          gc:0, gr:0 },
    { id:"mem_db_adp",      label:"memory-db-adapter",        gc:1, gr:0 },
  ]},
];
const dn    = (f,t) => [`${f}.cx`,`${f}.bottom`,  `${f}.cx`,`${t}.cy`,  `${t}.right`,`${t}.cy`];
const dnLft = (f,t) => [`${f}.cx`,`${f}.bottom`,  `${f}.cx`,`${t}.cy`,  `${t}.left`, `${t}.cy`];
const viaVC = (f,t) => [`${f}.right`,`${f}.cy`,   `VC`,`${f}.cy`,  `VC`,`${t}.cy`,  `${t}.left`,`${t}.cy`];
const viaH  = (f,H,t) => [`${f}.cx`,`${f}.bottom`,  `${f}.cx`,H,  `${t}.cx`,H,  `${t}.cx`,`${t}.top`];
const vsub  = (m,s) => [`${s}.cx`,`${m}.bottom`,  `${s}.cx`,`${s}.top`];
const viaVR = (f,t) => [`${f}.right`,`${f}.cy`,  "VR",`${f}.cy`,  "VR",`${t}.cy`,  `${t}.right`,`${t}.cy`];
const branch1 = t => [`openkk.cx`,`openkk.bottom`, `openkk.cx`,`H1a`, `${t}.cx`,`H1a`, `${t}.cx`,`${t}.top`];
const branch2 = t => [`openkk.cx`,`openkk.bottom`, `openkk.cx`,`H1a`, `CM`,`H1a`, `CM`,`H1b`, `${t}.cx`,`H1b`, `${t}.cx`,`${t}.top`];
const branchVR = t => [`openkk.right`,`openkk.cy`, `VR`,`openkk.cy`, `VR`,`H3a`, `SM`,`H3a`, `SM`,`H3b`, `${t}.cx`,`H3b`, `${t}.cx`,`${t}.top`];

const EDGES = [
  ["openkk","client",     ...branch1("client")],
  ["openkk","emb_bk_adp", ...branch2("emb_bk_adp")],
  ["openkk","print_adp",  ...branch2("print_adp")],
  ["openkk","emb_bk",      ...viaVR("openkk","emb_bk")],
  ["openkk","file_db_adp", ...branchVR("file_db_adp")],
  ["openkk","mem_db_adp",  ...branchVR("mem_db_adp")],
  ["emb_bk_adp","client_ports", ...dn("emb_bk_adp","client_ports")],
  ["print_adp",  "client_ports", ...dn("print_adp", "client_ports")],
  ["emb_bk_adp","emb_bk",       ...viaH("emb_bk_adp","H2","emb_bk")],
  ["emb_bk","server", ...viaH("emb_bk","H3","server")],
  ["file_db_adp","server_ports",  ...dn("file_db_adp","server_ports")],
  ["mem_db_adp", "server_ports",  ...dn("mem_db_adp", "server_ports")],
  ["client","client_ui",       ...vsub("client","client_ui")],
  ["client","client_usecases", ...vsub("client","client_usecases")],
  ["client","client_ports",    ...vsub("client","client_ports")],
  ["client","client_domain",   ...vsub("client","client_domain")],
  ["server","server_api",      ...vsub("server","server_api")],
  ["server","server_usecases", ...vsub("server","server_usecases")],
  ["server","server_ports",    ...vsub("server","server_ports")],
  ["server","server_domain",   ...vsub("server","server_domain")],
  ["client_ui","client_usecases"],
  ["client_ui","client_domain",   ...viaVC("client_ui","client_domain")],
  ["client_usecases","client_ports",  ...dnLft("client_usecases","client_ports")],
  ["client_usecases","client_domain", ...dnLft("client_usecases","client_domain")],
  ["client_ports","client_domain"],
  ["server_api","server_usecases"],
  ["server_api","server_ports",  ...viaVC("server_api","server_ports")],
  ["server_api","server_domain", ...viaVC("server_api","server_domain")],
  ["server_usecases","server_ports",  ...dnLft("server_usecases","server_ports")],
  ["server_usecases","server_domain", ...dnLft("server_usecases","server_domain")],
  ["server_ports","server_domain"],
];


const fullW  = L.col0w + L.colGap + L.col1w;
const groupH = nr => L.labelH + L.pad + nr*L.nodeH + (nr-1)*L.nodeGap + L.pad;
const NODES = GROUPS.flatMap(g => g.nodes.map(n => ({...n, _g:g.id})));
GROUPS.forEach(g => { g.nr = g.nodes.reduce((m,n) => Math.max(m, n.gr+1), 1); });
const rows = [...new Set(GROUPS.map(g => g.row))].sort((a,b) => a-b);
const maxH = {};
GROUPS.forEach(g => { maxH[g.row] = Math.max(maxH[g.row]||0, groupH(g.nr)); });
let _y = L.margin;
const rowY = {};
rows.forEach(r => { rowY[r] = _y; _y += maxH[r] + (ROW_GAP[r] ?? L.rowGap); });
const gmap = {};
GROUPS.forEach(g => {
  gmap[g.id] = {
    x: g.col===0 ? L.margin : L.margin+L.col0w+L.colGap,
    y: rowY[g.row],
    w: g.cs===2 ? fullW : (g.col===0 ? L.col0w : L.col1w),
    h: groupH(g.nr),
  };
});
const nmap = {};
NODES.forEach(n => {
  const g = gmap[n._g];
  const nw = n.nc===2 ? 2*L.nodeW+L.innerColGap : L.nodeW;
  const cx = n.center ? g.x+g.w/2 :
             n.nc===2 ? g.x+L.pad+nw/2 :
             g.x+L.pad+L.nodeW/2+n.gc*(L.nodeW+L.innerColGap);
  nmap[n.id] = { cx, cy: g.y+L.labelH+L.pad+L.nodeH/2+n.gr*(L.nodeH+L.nodeGap), hw: nw/2 };
});
const appBottom = gmap.app.y + gmap.app.h;
const embBottom = gmap.embedded.y + gmap.embedded.h;
const C = {
  VL: Math.round(L.margin/2),
  VR: L.margin+fullW+Math.round(L.margin/2),
  VM: L.margin+L.col0w+Math.floor(L.colGap/2),
  VC: L.margin+L.pad+L.nodeW+Math.floor(L.innerColGap/2),
  CM:  gmap.cadapter.x + Math.round(gmap.cadapter.w / 2),
  H1a: Math.round(appBottom + (gmap.client.y - appBottom) / 3),
  H1b: Math.round(appBottom + (gmap.client.y - appBottom) * 2/3),
  H2: Math.round((gmap.client.y+gmap.client.h + gmap.embedded.y) / 2),
  H3: Math.round((embBottom + gmap.server.y) / 2),
  SM:  gmap.sadapter.x + Math.round(gmap.sadapter.w / 2),
  H3a: Math.round(embBottom + (gmap.server.y - embBottom) / 3),
  H3b: Math.round(embBottom + (gmap.server.y - embBottom) * 2/3),
};
const NATURAL_W = L.margin + fullW + L.margin;
const NATURAL_H = _y - L.rowGap + L.margin;

const canvas = document.getElementById("canvas");
canvas.style.width  = NATURAL_W + "px";
canvas.style.height = NATURAL_H + "px";

const mk = (cls, style) => {
  const d = document.createElement("div"); d.className=cls; d.style.cssText=style||""; return d;
};
GROUPS.forEach(({id, label}) => {
  const b = gmap[id];
  const d = mk("grp", `left:${b.x}px;top:${b.y}px;width:${b.w}px;height:${b.h}px`);
  d.innerHTML = `<div class="gl">${label}</div>`;
  canvas.appendChild(d);
});
NODES.forEach(({id, label}) => {
  const {cx, cy, hw} = nmap[id];
  const d = mk("nd", `left:${cx-hw}px;top:${cy-L.nodeH/2}px;width:${hw*2}px;height:${L.nodeH}px`);
  const span = document.createElement("span");
  span.textContent = label;
  d.appendChild(span);
  canvas.appendChild(d);
});
function R(r) {
  if (typeof r === "number") return r;
  if (r in C) return C[r];
  const [id, p] = r.split(".");
  const {cx, cy, hw} = nmap[id]; const hh = L.nodeH/2;
  return {cx, cy, top:cy-hh, bottom:cy+hh, left:cx-hw, right:cx+hw}[p];
}
function seg(x1, y1, x2, y2, tip) {
  const dx=x2-x1, dy=y2-y1;
  canvas.appendChild(mk(tip ? "el" : "el no-arr",
    `left:${x1}px;top:${y1-0.75}px;width:${Math.hypot(dx,dy)}px;transform:rotate(${Math.atan2(dy,dx)*180/Math.PI}deg)`));
}
EDGES.forEach(([fid, tid, ...refs]) => {
  let pts;
  if (refs.length >= 4) {
    pts = [];
    for (let i = 0; i < refs.length; i+=2) pts.push([R(refs[i]), R(refs[i+1])]);
  } else {
    const f=nmap[fid], t=nmap[tid], dx=t.cx-f.cx, dy=t.cy-f.cy, hh=L.nodeH/2;
    if      (Math.abs(dx)<1) { const s=Math.sign(dy); pts=[[f.cx,f.cy+s*hh],[t.cx,t.cy-s*hh]]; }
    else if (Math.abs(dy)<1) { const s=Math.sign(dx); pts=[[f.cx+s*f.hw,f.cy],[t.cx-s*t.hw,t.cy]]; }
    else { const midY=(f.cy+t.cy)/2; pts=[[f.cx,f.cy+hh],[f.cx,midY],[t.cx,midY],[t.cx,t.cy-hh]]; }
  }
  for (let i=0; i<pts.length-1; i++) seg(pts[i][0],pts[i][1],pts[i+1][0],pts[i+1][1], i===pts.length-2);
});
const wrap = document.getElementById("canvas-wrap");
function refit() {
  const s = Math.min(1, wrap.clientWidth / NATURAL_W);
  canvas.style.transform = `scale(${s})`;
  wrap.style.height = Math.ceil(NATURAL_H * s) + "px";
}
new ResizeObserver(refit).observe(wrap);
refit();
</script>
</body>
</html>
